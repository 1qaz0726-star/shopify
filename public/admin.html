<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consentry Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper:     #f6f2e9;
        --paper-2:   #efeadd;
        --card:      #fcfaf4;
        --ink:       #1c1b16;
        --ink-soft:  #56544a;
        --ink-faint: #8d8a7c;
        --line:      #ddd6c4;
        --pine:      #2c5446;
        --pine-deep: #1f3d33;
        --bad:       #b23a2e;
        --warn:      #b9802a;
        --good:      #2f6b4f;
        --radius:    10px;
        --mono:      "IBM Plex Mono", "Courier New", monospace;
        --ease:      cubic-bezier(0.22, 0.61, 0.36, 1);
      }

      [hidden] { display: none !important; }
      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "IBM Plex Sans", -apple-system, system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Layout ─────────────────────────────────────── */
      .admin-wrap { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 4rem; }

      /* ── Header ─────────────────────────────────────── */
      .admin-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1.4rem 0 1.2rem; border-bottom: 1px solid var(--line); margin-bottom: 2.4rem;
      }
      .admin-head__brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: inherit; }
      .admin-head__logo  { height: 40px; width: auto; mix-blend-mode: multiply; }
      .admin-head__tag {
        font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--pine); background: #d9f0e4; padding: 0.2rem 0.55rem; border-radius: 999px;
      }
      .admin-head__logout {
        font: inherit; font-size: 0.88rem; color: var(--ink-soft); background: none;
        border: 1px solid var(--line); border-radius: 999px; padding: 0.38rem 0.9rem; cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }
      .admin-head__logout:hover { border-color: var(--ink); color: var(--ink); }

      /* ── Section label ──────────────────────────────── */
      .section-label {
        font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.18em;
        text-transform: uppercase; color: var(--pine); margin: 0 0 0.8rem;
      }

      /* ── Cards ───────────────────────────────────────── */
      .card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: var(--radius); padding: 1.4rem 1.6rem; margin-bottom: 1.5rem;
      }
      .card__header {
        display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.9rem;
      }
      .card__title { font-family: "Fraunces", Georgia, serif; font-size: 1.25rem; font-weight: 500; margin: 0; }
      .card__hint  { font-size: 0.82rem; color: var(--ink-faint); font-family: var(--mono); }

      textarea {
        width: 100%; min-height: 88px; background: var(--paper);
        border: 1px solid var(--line); border-radius: 8px; padding: 0.6rem 0.85rem;
        font: 0.88rem/1.55 var(--mono); color: var(--ink); resize: vertical; outline: none;
        transition: border-color 0.15s;
      }
      textarea:focus { border-color: var(--pine); }
      textarea::placeholder { color: var(--ink-faint); }

      .card__foot { display: flex; align-items: center; gap: 1rem; margin-top: 0.75rem; }
      .card__note { font-size: 0.82rem; color: var(--ink-soft); font-family: var(--mono); }

      /* ── Pipeline ───────────────────────────────────── */
      .pipeline-stats { display: flex; gap: 2.5rem; margin-bottom: 1.1rem; }
      .stat-item { display: flex; flex-direction: column; }
      .stat-num {
        font-family: var(--mono); font-size: 2rem; font-weight: 500;
        color: var(--pine); line-height: 1;
      }
      .stat-label {
        font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--ink-faint); margin-top: 0.25rem;
      }
      .pipeline-bar {
        height: 6px; background: var(--paper-2); border-radius: 999px;
        overflow: hidden; margin-bottom: 1rem; border: 1px solid var(--line);
      }
      .pipeline-bar__fill {
        height: 100%; background: var(--pine); border-radius: 999px;
        transition: width 0.6s var(--ease);
      }
      .pipeline-status {
        font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.08em;
        text-transform: uppercase; padding: 0.18rem 0.65rem; border-radius: 999px;
      }
      .status--idle    { background: #e8e3d5; color: var(--ink-soft); }
      .status--running { background: #d1f0de; color: var(--good); }
      .status--done    { background: #dbeeff; color: #2455a0; }
      .btn-good { background: var(--good) !important; }
      .btn-good:hover { background: #1d5238 !important; }

      /* ── Buttons ─────────────────────────────────────── */
      .btn-primary {
        font: inherit; font-weight: 600; font-size: 0.9rem; background: var(--pine); color: var(--paper);
        border: none; border-radius: 999px; padding: 0.5rem 1.2rem; cursor: pointer;
        transition: background 0.15s var(--ease), transform 0.12s; white-space: nowrap;
      }
      .btn-primary:hover  { background: var(--pine-deep); transform: translateY(-1px); }
      .btn-primary:disabled { opacity: 0.5; cursor: progress; transform: none; }

      .btn-sm {
        font: inherit; font-size: 0.78rem; padding: 0.22rem 0.65rem; border-radius: 999px;
        border: 1px solid var(--line); background: none; color: var(--ink-soft); cursor: pointer;
        white-space: nowrap; transition: border-color 0.12s, color 0.12s, background 0.12s;
      }
      .btn-sm:hover         { border-color: var(--ink); color: var(--ink); }
      .btn-sm--pine         { border-color: var(--pine); color: var(--pine); }
      .btn-sm--pine:hover   { background: var(--pine); color: var(--paper); }
      .btn-sm--danger:hover { border-color: var(--bad); color: var(--bad); }

      /* ── Results table ──────────────────────────────── */
      .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
      .results-count  { font-size: 0.82rem; color: var(--ink-faint); font-family: var(--mono); }

      .tbl-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--card); }
      table     { width: 100%; border-collapse: collapse; }
      th {
        text-align: left; font-family: var(--mono); font-size: 0.68rem;
        letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint);
        padding: 0.75rem 1rem; border-bottom: 1px solid var(--line); white-space: nowrap;
      }
      td { padding: 0.65rem 1rem; border-bottom: 1px solid var(--line); vertical-align: middle; }
      tr:last-child td { border-bottom: none; }
      tr.result-row:hover td { background: var(--paper-2); }

      .td-domain { font-family: var(--mono); font-size: 0.85rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .td-score  { width: 70px; }
      .score-badge {
        display: inline-block; font-family: var(--mono); font-size: 0.85rem; font-weight: 500;
        padding: 0.15rem 0.5rem; border-radius: 999px; min-width: 40px; text-align: center;
      }
      .score--good { background: #d1f0de; color: var(--good); }
      .score--warn { background: #fef0d6; color: var(--warn); }
      .score--bad  { background: #fde8e6; color: var(--bad); }

      .td-trackers { font-size: 0.82rem; color: var(--ink-soft); max-width: 240px; }
      .td-date     { font-family: var(--mono); font-size: 0.76rem; color: var(--ink-faint); white-space: nowrap; }
      .td-status   { width: 88px; }
      .status-badge {
        font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.06em;
        text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 999px;
      }
      .status--pending { background: #e8e3d5; color: var(--ink-soft); }
      .status--sent    { background: #dbeeff; color: #2455a0; }
      .status--replied { background: #d1f0de; color: var(--good); }
      .td-actions      { white-space: nowrap; }
      .td-actions-inner { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; }

      /* ── Findings expand row ────────────────────────── */
      .findings-row td { padding: 0; border-bottom: 1px solid var(--line); }
      .findings-inner {
        padding: 0.9rem 1.2rem 1rem 2.2rem;
        background: var(--paper-2);
        border-top: 1px dashed var(--line);
      }
      .findings-inner h4 {
        font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--pine); margin: 0 0 0.65rem;
      }
      .finding-item { display: flex; gap: 0.6rem; margin-bottom: 0.45rem; font-size: 0.83rem; }
      .finding-sev {
        font-family: var(--mono); font-size: 0.68rem; padding: 0.12rem 0.45rem;
        border-radius: 999px; white-space: nowrap; align-self: flex-start; margin-top: 0.1rem;
      }
      .sev--critical { background: #fde8e6; color: var(--bad); }
      .sev--warning  { background: #fef0d6; color: var(--warn); }
      .sev--good     { background: #d1f0de; color: var(--good); }
      .sev--info     { background: #e8e3d5; color: var(--ink-soft); }
      .finding-text  { color: var(--ink-soft); line-height: 1.45; }
      .finding-detail { font-size: 0.78rem; color: var(--ink-faint); margin-top: 0.15rem; }

      /* ── Empty state ─────────────────────────────────── */
      .empty-state { text-align: center; padding: 3rem 1rem; color: var(--ink-faint); font-size: 0.92rem; }
      .empty-state span { display: block; font-size: 1.8rem; margin-bottom: 0.5rem; opacity: 0.3; }

      /* ── Login screen ─────────────────────────────────── */
      #login-view {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; background: var(--paper);
      }
      .login-card {
        background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
        padding: 2.5rem 2.2rem; width: 100%; max-width: 360px; text-align: center;
      }
      .login-card__logo  { height: 48px; mix-blend-mode: multiply; margin-bottom: 1.2rem; }
      .login-card__title { font-family: "Fraunces", Georgia, serif; font-size: 1.6rem; font-weight: 500; margin: 0 0 0.25rem; }
      .login-card__sub   { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--pine); margin: 0 0 1.8rem; }
      #login-form  { display: flex; flex-direction: column; gap: 0.75rem; }
      #pwd-input {
        width: 100%; background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
        padding: 0.65rem 0.9rem; font: 1rem "IBM Plex Sans", sans-serif; color: var(--ink);
        outline: none; text-align: center; letter-spacing: 0.15em; transition: border-color 0.15s;
      }
      #pwd-input:focus { border-color: var(--pine); }
      .login-card .btn-primary { width: 100%; padding: 0.65rem; font-size: 1rem; }
      #login-error { font-size: 0.85rem; color: var(--bad); margin-top: 0.25rem; font-family: var(--mono); }
    </style>
  </head>
  <body>

    <!-- ── Login ─────────────────────────────────────── -->
    <div id="login-view">
      <div class="login-card">
        <img class="login-card__logo" src="/logo.png" alt="Consentry" />
        <h1 class="login-card__title">Admin</h1>
        <p class="login-card__sub">Outreach dashboard</p>
        <form id="login-form" novalidate>
          <input id="pwd-input" type="password" placeholder="Password" autocomplete="current-password" />
          <button type="submit" class="btn-primary">Sign in</button>
        </form>
        <p id="login-error" hidden></p>
      </div>
    </div>

    <!-- ── Dashboard ─────────────────────────────────── -->
    <div id="dashboard-view" hidden>
      <div class="admin-wrap">

        <header class="admin-head">
          <a class="admin-head__brand" href="/" target="_blank">
            <img class="admin-head__logo" src="/logo.png" alt="Consentry" />
            <span class="admin-head__tag">Admin</span>
          </a>
          <button id="logout-btn" class="admin-head__logout">Sign out</button>
        </header>

        <!-- Pipeline -->
        <p class="section-label">掃描流水線</p>
        <div class="card">
          <div class="card__header">
            <h2 class="card__title">Auto-pipeline</h2>
            <span class="pipeline-status status--idle" id="pipeline-status">Idle</span>
          </div>
          <div class="pipeline-stats">
            <div class="stat-item">
              <span class="stat-num" id="stat-total">—</span>
              <span class="stat-label">Queue total</span>
            </div>
            <div class="stat-item">
              <span class="stat-num" id="stat-done">—</span>
              <span class="stat-label">Scanned</span>
            </div>
            <div class="stat-item">
              <span class="stat-num" id="stat-remaining">—</span>
              <span class="stat-label">Remaining</span>
            </div>
          </div>
          <div class="pipeline-bar">
            <div class="pipeline-bar__fill" id="pipeline-fill" style="width:0%"></div>
          </div>
          <div class="card__foot" style="flex-wrap:wrap;gap:0.6rem">
            <button id="fetch-btn" class="btn-primary">🔍 Fetch Shopify stores</button>
            <button id="scan-start-btn" class="btn-primary btn-good">▶ Start auto-scan</button>
            <button id="scan-stop-btn" class="btn-sm" hidden>■ Stop</button>
            <span id="pipeline-note" class="card__note"></span>
          </div>
        </div>

        <!-- Batch scan -->
        <p class="section-label">Batch scanner</p>
        <div class="card">
          <div class="card__header">
            <h2 class="card__title">Scan stores</h2>
            <span class="card__hint">Max 25 URLs · ~5 s each</span>
          </div>
          <textarea id="urls-input" placeholder="drsquatch.com&#10;allbirds.com&#10;beardbrand.com"></textarea>
          <div class="card__foot">
            <button id="scan-btn" class="btn-primary">Scan all</button>
            <span id="scan-status" class="card__note"></span>
          </div>
        </div>

        <!-- Results -->
        <div class="results-section">
          <div class="results-header">
            <p class="section-label" style="margin:0">Scan results</p>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <button id="filter-toggle" class="btn-sm">All stores</button>
              <span class="results-count" id="results-count"></span>
            </div>
          </div>
          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th>Domain</th>
                  <th>Score</th>
                  <th>Trackers</th>
                  <th>Scanned</th>
                  <th>Email</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
            <div id="empty-state" class="empty-state" hidden>
              <span>◎</span>
              No scans yet — discover or paste URLs above.
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="/admin.js" defer></script>
  </body>
</html>
