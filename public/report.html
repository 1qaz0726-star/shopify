<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GDPR Compliance Report — Consentry</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #f6f2e9;
      --paper-2: #efeadd;
      --card: #fcfaf4;
      --ink: #1c1b16;
      --ink-soft: #56544a;
      --ink-faint: #8d8a7c;
      --line: #ddd6c4;
      --pine: #2c5446;
      --pine-deep: #1f3d33;
      --bad: #b23a2e;
      --warn: #b9802a;
      --good: #2f6b4f;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "IBM Plex Sans", -apple-system, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    h1, h2, h3 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin: 0;
    }

    a { color: inherit; }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 6rem;
    }

    /* ── Header ── */
    .rpt-head {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--line);
    }

    .rpt-head img { height: 36px; width: auto; }

    .rpt-head__label {
      margin-left: auto;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.67rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--pine);
      background: rgba(44,84,70,0.09);
      padding: 0.25rem 0.65rem;
      border-radius: 4px;
    }

    /* ── Score card ── */
    .score-card {
      display: grid;
      grid-template-columns: 148px 1fr;
      gap: 2rem;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 480px) {
      .score-card { grid-template-columns: 1fr; text-align: center; }
    }

    /* SVG gauge */
    .gauge { display: block; }
    .gauge__track { fill: none; stroke: var(--line); stroke-width: 10; }
    .gauge__arc {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    .gauge__num {
      font-family: "Fraunces", Georgia, serif;
      font-size: 26px;
      font-weight: 500;
      fill: var(--ink);
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .gauge__sub {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      fill: var(--ink-faint);
      text-anchor: middle;
    }

    /* Score meta */
    .score-meta__eyebrow {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.72rem;
      color: var(--ink-faint);
      margin-bottom: 0.25rem;
      word-break: break-all;
    }

    .score-meta__heading { font-size: 1.4rem; margin-bottom: 0.65rem; }

    .risk-badge {
      display: inline-block;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }

    .risk--high   { background: rgba(178,58,46,.1);  color: var(--bad);  }
    .risk--medium { background: rgba(185,128,42,.1); color: var(--warn); }
    .risk--low    { background: rgba(47,107,79,.1);  color: var(--good); }
    .risk--clean  { background: rgba(47,107,79,.15); color: var(--good); }

    .score-meta__note { font-size: 0.85rem; color: var(--ink-soft); margin: 0; }

    /* ── Section ── */
    .section { margin-bottom: 2rem; }

    .section-label {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .section-label__text {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .section-label__count {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
      color: var(--ink-faint);
    }

    /* Tracker pills */
    .tracker-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .tracker-pill {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      padding: 0.22rem 0.6rem;
      background: rgba(178,58,46,.07);
      border: 1px solid rgba(178,58,46,.2);
      color: var(--bad);
      border-radius: 4px;
    }

    /* Finding rows */
    .finding {
      display: flex;
      gap: 0.7rem;
      align-items: flex-start;
      padding: 0.8rem 1rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-bottom: 0.45rem;
    }

    .finding:last-child { margin-bottom: 0; }

    .finding__sev {
      flex-shrink: 0;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.42rem;
      border-radius: 3px;
      margin-top: 0.18rem;
    }

    .sev--critical { background: rgba(178,58,46,.1);  color: var(--bad);  }
    .sev--warning  { background: rgba(185,128,42,.1); color: var(--warn); }
    .sev--good     { background: rgba(47,107,79,.1);  color: var(--good); }
    .sev--info     { background: var(--paper-2);      color: var(--ink-faint); }

    .finding__title { font-size: 0.88rem; font-weight: 500; }
    .finding__detail { font-size: 0.8rem; color: var(--ink-soft); margin: 0.15rem 0 0; }

    /* ── CTA box ── */
    .cta-box {
      background: var(--pine);
      color: #f6f2e9;
      border-radius: var(--radius);
      padding: 2rem;
      margin-top: 2.5rem;
    }

    .cta-box h2 {
      color: #f6f2e9;
      font-size: 1.25rem;
      margin-bottom: 0.45rem;
    }

    .cta-box p {
      font-size: 0.88rem;
      opacity: 0.78;
      margin: 0 0 1.2rem;
      line-height: 1.55;
    }

    .cta-btn {
      display: inline-block;
      background: #f6f2e9;
      color: var(--pine-deep);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.6rem 1.25rem;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .cta-btn:hover { opacity: 0.88; }

    /* ── Footer ── */
    .rpt-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 0.77rem;
      color: var(--ink-faint);
    }

    .rpt-footer a { color: var(--pine); text-decoration: none; }
    .rpt-footer a:hover { text-decoration: underline; }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 6rem 1rem;
      color: var(--ink-soft);
    }

    .state h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--ink); }
    .state p { margin: 0.3rem 0; font-size: 0.9rem; }
    .state a { color: var(--pine); }
  </style>
</head>
<body>
  <div class="wrap" id="root">
    <div class="state"><p>Loading report…</p></div>
  </div>
  <script src="/report.js"></script>
</body>
</html>
